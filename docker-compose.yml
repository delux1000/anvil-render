version: '3.8'

services:
  anvil:
    build: .
    container_name: anvil-persistence
    ports:
      - "8545:8545"  # RPC
      - "3000:3000"  # Explorer
    environment:
      - PORT=8545
      - EXPLORER_PORT=3000
      - JSONBIN_BIN_ID=6936f28bae596e708f8bafc0
      - JSONBIN_API_KEY=$2a$10$aAW84k1Q4lfQR8ELHBneT.01Go2JevCCoay/TR4AATTeNpTd7ou9K
      - FORK_URL=https://eth-mainnet.g.alchemy.com/v2/QFjExKnnaI2I4qTV7EFM7WwB0gl08X0n
      - CHAIN_ID=1
      - PUBLIC_URL=https://anvil-render-q5wl.onrender.com
    volumes:
      - ./data:/tmp
    restart: unless-stopped
    networks:
      - anvil-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  anvil-network:
    driver: bridge
