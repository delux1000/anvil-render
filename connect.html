<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anvil Wallet Connect</title>
    <style>
        :root {
            --bg: #060a13; --card: #0d1117; --border: #21262d;
            --text: #e6edf3; --text2: #8b949e; --accent: #3b82f6;
            --green: #22c55e; --red: #ef4444; --orange: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 500px; width: 100%; }
        .header { text-align: center; padding: 30px 0 15px; }
        .header h1 { font-size: 24px; font-weight: 800; color: var(--accent); }
        .header p { color: var(--text2); font-size: 12px; margin-top: 5px; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 14px; text-align: center; }
        .card.connected { border-color: #22c55e40; }
        .status-text { font-weight: 600; font-size: 14px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .dot.on { background: var(--green); }
        .dot.off { background: #6b7280; }
        
        .address { font-family: monospace; color: var(--accent); font-size: 13px; margin: 8px 0; word-break: break-all; cursor: pointer; }
        .balances { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }
        .bal-item { background: #0a0e17; border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; }
        .bal-label { font-size: 9px; color: var(--text2); text-transform: uppercase; }
        .bal-value { font-size: 16px; font-weight: 700; color: var(--accent); }
        
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.2s; margin-bottom: 8px; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-danger { background: #490202; color: var(--red); border: 1px solid #dc262640; }
        .btn-success { background: #04260f; color: var(--green); border: 1px solid #23863640; }
        .btn-warn { background: #341a00; color: var(--orange); border: 1px solid #9e6a0340; }
        
        .wallet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .wallet-btn { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 10px; cursor: pointer; text-align: center; transition: all 0.2s; color: var(--text); font-family: inherit; font-size: 12px; }
        .wallet-btn:hover { border-color: var(--accent); background: #131a24; }
        .wallet-btn .w-icon { font-size: 24px; display: block; margin-bottom: 4px; }
        .wallet-btn .w-name { font-weight: 600; font-size: 11px; }
        
        .manual-config { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-top: 14px; font-size: 11px; }
        .manual-config code { background: #0a0e17; padding: 2px 6px; border-radius: 4px; color: var(--accent); font-size: 10px; word-break: break-all; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a1f2e; border: 1px solid var(--border); color: #fff; padding: 10px 18px; border-radius: 10px; font-weight: 600; font-size: 12px; z-index: 9999; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔗 Anvil Wallet Connect</h1>
            <p>Connect to Anvil Mainnet Fork • Chain ID: 1</p>
        </div>

        <!-- Status Card -->
        <div class="card" id="statusCard">
            <div class="status-text">
                <span class="dot off" id="statusDot"></span>
                <span id="statusText">Not Connected</span>
            </div>
            <div class="address hidden" id="addressDisplay" onclick="copyAddress()" title="Click to copy"></div>
            <div class="balances hidden" id="balanceRow">
                <div class="bal-item"><div class="bal-label">ETH</div><div class="bal-value" id="ethBal">—</div></div>
                <div class="bal-item"><div class="bal-label">Chain</div><div class="bal-value" id="chainId">1</div></div>
            </div>
        </div>

        <!-- Actions -->
        <div class="hidden" id="actionsRow">
            <button class="btn btn-primary" onclick="addAnvilNetwork()">⛓ Add/Switch to Anvil Network</button>
            <button class="btn btn-danger hidden" id="disconnectBtn" onclick="disconnect()">🔌 Disconnect</button>
        </div>

        <!-- Manual Config -->
        <div class="manual-config">
            <strong>📋 Manual Network Setup:</strong><br>
            RPC: <code>https://anvil-render-q5wl.onrender.com</code><br>
            Chain ID: <code>1</code> | Symbol: <code>ETH</code>
        </div>

        <!-- Wallet Buttons -->
        <div class="wallet-grid">
            <button class="wallet-btn" onclick="connectWallet()">
                <span class="w-icon">🦊</span>
                <span class="w-name">MetaMask</span>
            </button>
            <button class="wallet-btn" onclick="connectWallet()">
                <span class="w-icon">🛡️</span>
                <span class="w-name">Trust Wallet</span>
            </button>
            <button class="wallet-btn" onclick="connectWallet()">
                <span class="w-icon">🟢</span>
                <span class="w-name">TokenPocket</span>
            </button>
            <button class="wallet-btn" onclick="connectWallet()">
                <span class="w-icon">🔵</span>
                <span class="w-name">Coinbase</span>
            </button>
            <button class="wallet-btn" onclick="connectWallet()">
                <span class="w-icon">🅾️</span>
                <span class="w-name">OKX Wallet</span>
            </button>
            <button class="wallet-btn" onclick="connectWallet()">
                <span class="w-icon">📱</span>
                <span class="w-name">Any Wallet</span>
            </button>
        </div>
    </div>

    <script>
        var RPC_URL = 'https://anvil-render-q5wl.onrender.com';
        var CHAIN_ID_HEX = '0x1';
        var currentAccount = null;
        var provider = null;

        // Check if ethereum is available
        function getProvider() {
            if (window.ethereum) return window.ethereum;
            if (window.web3 && window.web3.currentProvider) return window.web3.currentProvider;
            return null;
        }

        // Toast
        function toast(msg) {
            var t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(function() { t.remove(); }, 3000);
        }

        // Update UI
        function updateUI(account) {
            var connected = !!account;
            currentAccount = account;
            
            document.getElementById('statusDot').className = 'dot ' + (connected ? 'on' : 'off');
            document.getElementById('statusText').textContent = connected ? 'Connected' : 'Not Connected';
            document.getElementById('addressDisplay').classList.toggle('hidden', !connected);
            document.getElementById('balanceRow').classList.toggle('hidden', !connected);
            document.getElementById('actionsRow').classList.toggle('hidden', !connected);
            document.getElementById('disconnectBtn').classList.toggle('hidden', !connected);
            
            if (connected) {
                document.getElementById('addressDisplay').textContent = account;
                document.getElementById('statusCard').classList.add('connected');
                fetchBalance(account);
            } else {
                document.getElementById('statusCard').classList.remove('connected');
                document.getElementById('ethBal').textContent = '—';
            }
        }

        // Fetch balance
        function fetchBalance(account) {
            var xhr = new XMLHttpRequest();
            xhr.open('POST', RPC_URL, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onload = function() {
                if (xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    if (data.result) {
                        var eth = (parseInt(data.result, 16) / 1e18).toFixed(4);
                        document.getElementById('ethBal').textContent = eth + ' ETH';
                    }
                } else {
                    // CORS issue - try alternative
                    fetchBalanceViaProvider(account);
                }
            };
            xhr.onerror = function() {
                fetchBalanceViaProvider(account);
            };
            xhr.send(JSON.stringify({
                jsonrpc: '2.0',
                method: 'eth_getBalance',
                params: [account, 'latest'],
                id: 1
            }));
        }

        // Fallback balance fetch via provider
        function fetchBalanceViaProvider(account) {
            if (provider) {
                provider.request({
                    method: 'eth_getBalance',
                    params: [account, 'latest']
                }).then(function(bal) {
                    var eth = (parseInt(bal, 16) / 1e18).toFixed(4);
                    document.getElementById('ethBal').textContent = eth + ' ETH';
                }).catch(function() {
                    document.getElementById('ethBal').textContent = 'Error';
                });
            } else {
                document.getElementById('ethBal').textContent = 'RPC CORS';
            }
        }

        // Connect wallet
        async function connectWallet() {
            var p = getProvider();
            
            if (!p) {
                // Check if mobile
                if (/Mobi|Android/i.test(navigator.userAgent)) {
                    window.location.href = 'https://metamask.app.link/dapp/' + window.location.host;
                    return;
                }
                toast('❌ No wallet detected! Install MetaMask or Trust Wallet extension.');
                return;
            }

            provider = p;

            try {
                var accounts = await provider.request({ method: 'eth_requestAccounts' });
                
                if (accounts && accounts.length > 0) {
                    // Try to switch to Anvil network
                    try {
                        await provider.request({
                            method: 'wallet_switchEthereumChain',
                            params: [{ chainId: CHAIN_ID_HEX }]
                        });
                    } catch (e) {
                        // If chain doesn't exist, add it
                        if (e.code === 4902 || e.code === -32603) {
                            await provider.request({
                                method: 'wallet_addEthereumChain',
                                params: [{
                                    chainId: CHAIN_ID_HEX,
                                    chainName: 'Anvil Mainnet Fork',
                                    nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 },
                                    rpcUrls: [RPC_URL],
                                    blockExplorerUrls: ['https://delux1000.github.io/anvil-render/']
                                }]
                            });
                        }
                    }

                    updateUI(accounts[0]);
                    toast('✅ Connected!');

                    // Listen for changes
                    provider.on('accountsChanged', function(accs) {
                        if (accs.length === 0) {
                            updateUI(null);
                        } else {
                            updateUI(accs[0]);
                        }
                    });

                    provider.on('chainChanged', function() {
                        if (currentAccount) fetchBalance(currentAccount);
                    });

                }
            } catch (e) {
                if (e.code === 4001) {
                    toast('❌ Connection rejected');
                } else {
                    toast('❌ ' + (e.message || 'Connection failed'));
                }
            }
        }

        // Add/Switch network manually
        async function addAnvilNetwork() {
            var p = getProvider();
            if (!p) return toast('❌ No wallet detected!');
            
            try {
                await p.request({
                    method: 'wallet_addEthereumChain',
                    params: [{
                        chainId: CHAIN_ID_HEX,
                        chainName: 'Anvil Mainnet Fork',
                        nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 },
                        rpcUrls: [RPC_URL],
                        blockExplorerUrls: ['https://delux1000.github.io/anvil-render/']
                    }]
                });
                toast('✅ Network added! Connect now.');
            } catch (e) {
                // Try switch instead
                try {
                    await p.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: CHAIN_ID_HEX }]
                    });
                    toast('✅ Switched to Anvil!');
                } catch (e2) {
                    toast('❌ Could not add network. Use manual setup above.');
                }
            }
        }

        // Copy address
        function copyAddress() {
            if (currentAccount) {
                navigator.clipboard.writeText(currentAccount).then(function() {
                    toast('📋 Copied!');
                });
            }
        }

        // Disconnect
        function disconnect() {
            updateUI(null);
            provider = null;
            toast('🔌 Disconnected');
        }

        // Auto-reconnect on load
        async function autoReconnect() {
            var p = getProvider();
            if (!p) return;
            
            try {
                var accounts = await p.request({ method: 'eth_accounts' });
                if (accounts && accounts.length > 0) {
                    provider = p;
                    updateUI(accounts[0]);
                    
                    provider.on('accountsChanged', function(accs) {
                        if (accs.length === 0) updateUI(null);
                        else updateUI(accs[0]);
                    });
                }
            } catch (e) {}
        }

        // Init
        autoReconnect();
    </script>
</body>
</html>
